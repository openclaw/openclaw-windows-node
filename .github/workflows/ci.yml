name: Build and Test

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Ensure .squad stays untracked
      shell: bash
      run: |
        tracked_squad="$(git ls-files .squad)"
        if [ -n "$tracked_squad" ]; then
          echo "::error::.squad files must not be tracked by Git. Keep squad state local and ignored."
          echo "$tracked_squad"
          exit 1
        fi

  test:
    needs: repo-hygiene
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    steps:
    - name: Fail if repo hygiene failed
      if: ${{ needs.repo-hygiene.result != 'success' }}
      shell: pwsh
      run: |
        Write-Error "repo-hygiene failed; see the repo-hygiene job output."
        exit 1

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.x'

    - name: Determine Version
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4

    - name: Restore dependencies
      run: dotnet restore

    # dotnet-coverage replaces coverlet because the integration tests spawn the
    # tray exe out-of-process; coverlet only instruments the in-proc test
    # assembly. Installing once at the job level lets every test step wrap its
    # `dotnet test` invocation in `dotnet-coverage collect`.
    - name: Install dotnet-coverage
      run: dotnet tool install --global dotnet-coverage

    - name: Build Shared Library
      run: dotnet build src/OpenClaw.Shared -c Debug --no-restore

    - name: Build Tray App (WinUI)
      run: dotnet build src/OpenClaw.Tray.WinUI -c Debug -r win-x64

    - name: Build Tests
      run: |
        dotnet build tests/OpenClaw.Shared.Tests -c Debug --no-restore
        dotnet build tests/OpenClaw.Tray.Tests -c Debug -r win-x64 --no-restore
        dotnet build tests/OpenClaw.Connection.Tests -c Debug --no-restore
        dotnet build tests/OpenClaw.WinNode.Cli.Tests -c Debug --no-restore
        dotnet build tests/OpenClaw.Tray.IntegrationTests -c Debug -r win-x64 --no-restore
        dotnet build tests/OpenClaw.Tray.UITests -c Debug -r win-x64 --no-restore
        dotnet build tests/OpenClawTray.FunctionalUI.Tests -c Debug -r win-x64 --no-restore
        dotnet build tests/OpenClaw.SetupEngine.Tests -c Debug -r win-x64

    - name: Run Shared Tests
      env:
        OPENCLAW_RUN_INTEGRATION: 1
      run: >
        dotnet-coverage collect
        --output TestResults\Shared\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.Shared.Tests
        --no-build
        -c Debug
        --verbosity normal
        --results-directory TestResults\Shared
        --logger trx;LogFileName=OpenClaw.Shared.Tests.trx"

    - name: Run Tray Tests
      run: >
        dotnet-coverage collect
        --output TestResults\Tray\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.Tray.Tests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults\Tray
        --logger trx;LogFileName=OpenClaw.Tray.Tests.trx"

    - name: Run Connection Tests
      run: >
        dotnet-coverage collect
        --output TestResults\Connection\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.Connection.Tests
        --no-build
        -c Debug
        --verbosity normal
        --results-directory TestResults\Connection
        --logger trx;LogFileName=OpenClaw.Connection.Tests.trx"

    - name: Run WinNode CLI Tests
      run: >
        dotnet-coverage collect
        --output TestResults\WinNodeCli\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.WinNode.Cli.Tests
        --no-build
        -c Debug
        --verbosity normal
        --results-directory TestResults\WinNodeCli
        --logger trx;LogFileName=OpenClaw.WinNode.Cli.Tests.trx"

    # Tray integration tests gate on OPENCLAW_RUN_INTEGRATION; set it so the
    # MCP-server / capability tests actually run. dotnet-coverage with no
    # filter captures coverage for both the test host AND the spawned tray
    # exe (coverlet could not — see tests/Directory.Build.props comment).
    - name: Run Tray Integration Tests
      env:
        OPENCLAW_RUN_INTEGRATION: 1
      run: >
        dotnet-coverage collect
        --output TestResults\TrayIntegration\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.Tray.IntegrationTests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults\TrayIntegration
        --logger trx;LogFileName=OpenClaw.Tray.IntegrationTests.trx"

    # UI tests need a real visual tree AND a system-registered WindowsAppRuntime
    # framework MSIX — the test fixture calls Bootstrap.Initialize(2.0, stable),
    # which looks up the framework package by identity. The hosted windows-2025
    # runner image doesn't preinstall it, so we install it explicitly here.
    # Version pinned to match Microsoft.WindowsAppSDK 2.0.1 in the csprojs.
    - name: Install WindowsAppRuntime 2.0.1
      shell: pwsh
      run: |
        $url = "https://aka.ms/windowsappsdk/2.0/2.0.1/windowsappruntimeinstall-x64.exe"
        $exe = "$env:RUNNER_TEMP\WindowsAppRuntimeInstall.exe"
        Invoke-WebRequest -Uri $url -OutFile $exe
        & $exe --quiet
        if ($LASTEXITCODE -ne 0) { throw "WindowsAppRuntimeInstall failed with exit code $LASTEXITCODE" }

    - name: Run Functional UI Tests
      run: >
        dotnet-coverage collect
        --output TestResults\FunctionalUI\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClawTray.FunctionalUI.Tests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults\FunctionalUI
        --logger trx;LogFileName=OpenClawTray.FunctionalUI.Tests.trx"

    - name: Run SetupEngine Tests
      run: >
        dotnet-coverage collect
        --output TestResults\SetupEngine\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.SetupEngine.Tests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults\SetupEngine
        --logger trx;LogFileName=OpenClaw.SetupEngine.Tests.trx"

    - name: Run Tray UI Tests
      run: >
        dotnet-coverage collect
        --output TestResults\TrayUI\coverage.cobertura.xml
        --output-format cobertura
        "dotnet test tests/OpenClaw.Tray.UITests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults\TrayUI
        --logger trx;LogFileName=OpenClaw.Tray.UITests.trx"

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: TestResults/
        if-no-files-found: warn

    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}

  e2etests:
    needs: repo-hygiene
    if: ${{ !cancelled() }}
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
    - name: Fail if repo hygiene failed
      if: ${{ needs.repo-hygiene.result != 'success' }}
      shell: pwsh
      run: |
        Write-Error "repo-hygiene failed; see the repo-hygiene job output."
        exit 1

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Shared Library
      run: dotnet build src/OpenClaw.Shared -c Debug --no-restore

    - name: Build SetupEngine
      run: dotnet build src/OpenClaw.SetupEngine -c Debug --no-restore

    - name: Build Tray App (WinUI)
      run: dotnet build src/OpenClaw.Tray.WinUI -c Debug -r win-x64

    - name: Build E2E Tests
      run: dotnet build tests/OpenClaw.E2ETests -c Debug -r win-x64

    - name: Run E2E Tests
      run: >
        dotnet test tests/OpenClaw.E2ETests
        --no-build
        -c Debug
        -r win-x64
        --verbosity normal
        --results-directory TestResults/E2E
        --logger "trx;LogFileName=OpenClaw.E2ETests.trx"
        --logger "console;verbosity=detailed"

    - name: Upload E2E Test Results & Logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-test-results
        path: |
          TestResults/E2E/
        if-no-files-found: warn

  build:
    needs: [test, e2etests]
    runs-on: ${{ matrix.rid == 'win-arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore WinUI Tray App
      run: dotnet restore src/OpenClaw.Tray.WinUI -r ${{ matrix.rid }}

    - name: Build WinUI Tray App (Release)
      run: dotnet build src/OpenClaw.Tray.WinUI --no-restore -c Release -r ${{ matrix.rid }} -p:Version=${{ needs.test.outputs.semVer }}

    - name: Publish WinUI Tray App
      run: dotnet publish src/OpenClaw.Tray.WinUI -c Release -r ${{ matrix.rid }} --self-contained --no-restore -p:Version=${{ needs.test.outputs.semVer }} -o publish

    - name: Publish SetupEngine.UI
      run: |
        dotnet publish src/OpenClaw.SetupEngine.UI -c Release -r ${{ matrix.rid }} --self-contained -p:Version=${{ needs.test.outputs.semVer }} -o publish-setup
        mkdir publish\SetupEngine
        copy publish-setup\* publish\SetupEngine\ -Recurse

    - name: Disable NuGet source mapping for signing
      if: startsWith(github.ref, 'refs/tags/v') && matrix.rid != 'win-arm64'
      shell: pwsh
      run: |
        if (Test-Path NuGet.Config) {
          Rename-Item NuGet.Config NuGet.Config.signing.bak -Force
        }

    - name: Azure Login for Signing
      if: startsWith(github.ref, 'refs/tags/v') && matrix.rid != 'win-arm64'
      uses: azure/login@v3
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign Executable
      if: startsWith(github.ref, 'refs/tags/v') && matrix.rid != 'win-arm64'
      uses: azure/trusted-signing-action@v2
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://wus2.codesigning.azure.net/
        signing-account-name: hanselman
        certificate-profile-name: WindowsEdgeLight
        files-folder: publish
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Upload Tray Artifact
      uses: actions/upload-artifact@v7
      with:
        name: openclaw-tray-${{ matrix.rid }}
        path: publish/

  build-msix:
    needs: [test, e2etests]
    runs-on: ${{ matrix.rid == 'win-arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]
        include:
          - rid: win-x64
            platform: x64
          - rid: win-arm64
            platform: ARM64

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 10 for VS MSBuild
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.100

    - name: Pin .NET SDK for MSIX packaging
      shell: pwsh
      run: |
        $globalJson = Get-Content global.json -Raw | ConvertFrom-Json
        $globalJson.sdk.rollForward = "disable"
        $globalJson | ConvertTo-Json -Depth 5 | Set-Content global.json
        dotnet --version

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Restore
      run: dotnet restore src/OpenClaw.Tray.WinUI -r ${{ matrix.rid }}

    - name: Patch MSIX manifest metadata
      shell: pwsh
      run: |
        $version = "${{ needs.test.outputs.majorMinorPatch }}.0"
        $isAlpha = "${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}" -eq "true"
        $identityName = if ($isAlpha) { "OpenClaw.Companion.Alpha" } else { "OpenClaw.Companion" }
        $displayName = if ($isAlpha) { "OpenClaw Companion Alpha" } else { "OpenClaw Companion" }
        $manifest = "src/OpenClaw.Tray.WinUI/Package.appxmanifest"
        [xml]$xml = Get-Content $manifest
        $xml.Package.Identity.Name = $identityName
        $xml.Package.Identity.Version = $version
        $xml.Package.Properties.DisplayName = $displayName
        $trayApp = $xml.Package.Applications.Application | Where-Object { $_.Id -eq "App" } | Select-Object -First 1
        if (-not $trayApp) { throw "Tray application Id='App' not found in $manifest" }
        $trayApp.VisualElements.DisplayName = $displayName
        $xml.Save((Resolve-Path $manifest))
        Write-Host "Patched MSIX manifest to identity $identityName, display name '$displayName', version $version"

    - name: Patch CommandPalette MSIX manifest metadata
      shell: pwsh
      run: |
        # Keep the CommandPalette extension package metadata in lockstep with the
        # parent tray package so both sign under the same Trusted Signing cert
        # subject and are discoverable as a coherent product. The repo template
        # ships with placeholder Microsoft values that must NEVER ship.
        $version = "${{ needs.test.outputs.majorMinorPatch }}.0"
        $isAlpha = "${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}" -eq "true"
        $trayIdentity = if ($isAlpha) { "OpenClaw.Companion.Alpha" } else { "OpenClaw.Companion" }
        $cmdpalIdentity = "$trayIdentity.CommandPalette"
        $publisher = "CN=Scott Hanselman, O=Scott Hanselman, L=Forest Grove, S=Oregon, C=US"
        $publisherDisplay = "Scott Hanselman"
        $manifest = "src/OpenClaw.CommandPalette/Package.appxmanifest"
        [xml]$xml = Get-Content $manifest
        $xml.Package.Identity.Name = $cmdpalIdentity
        $xml.Package.Identity.Publisher = $publisher
        $xml.Package.Identity.Version = $version
        $xml.Package.Properties.PublisherDisplayName = $publisherDisplay
        $xml.Save((Resolve-Path $manifest))
        Write-Host "Patched CommandPalette MSIX manifest to identity $cmdpalIdentity, publisher '$publisher', version $version"

    - name: Render embedded AppInstaller
      shell: pwsh
      run: |
        $version = "${{ needs.test.outputs.majorMinorPatch }}.0"
        $assetVersion = "${{ needs.test.outputs.semVer }}"
        $tag = "${{ github.ref_name }}"
        $arch = if ("${{ matrix.rid }}" -eq "win-arm64") { "arm64" } else { "x64" }
        $publisher = "CN=Scott Hanselman, O=Scott Hanselman, L=Forest Grove, S=Oregon, C=US"
        $base = "https://github.com/${{ github.repository }}/releases/download/$tag"
        $msixUri = "$base/OpenClawCompanion-$assetVersion-${{ matrix.rid }}.msix"
        $isAlpha = "${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}" -eq "true"
        $identityName = if ($isAlpha) { "OpenClaw.Companion.Alpha" } else { "OpenClaw.Companion" }
        $feedPrefix = if ($isAlpha) { "openclaw-alpha" } else { "openclaw" }
        $appInstallerUri = "https://raw.githubusercontent.com/openclaw/openclaw-windows-node/master/installer/appinstaller/$feedPrefix-$arch.appinstaller"
        ./scripts/render-appinstaller.ps1 `
          -Version $version `
          -Publisher $publisher `
          -IdentityName $identityName `
          -ProcessorArchitecture $arch `
          -MsixUri $msixUri `
          -AppInstallerUri $appInstallerUri `
          -OutputPath "src/OpenClaw.Tray.WinUI/openclaw.appinstaller"

    - name: Publish SetupEngine UI for MSIX payload
      shell: pwsh
      run: |
        $publishDir = "artifacts/setupengine-${{ matrix.rid }}"
        $payloadDir = "src/OpenClaw.Tray.WinUI/SetupEngine"
        Remove-Item $publishDir -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item $payloadDir -Recurse -Force -ErrorAction SilentlyContinue
        dotnet publish src/OpenClaw.SetupEngine.UI `
          -c Release `
          -r ${{ matrix.rid }} `
          --self-contained `
          -p:PackageMsix=false `
          -p:Version=${{ needs.test.outputs.semVer }} `
          -o $publishDir
        New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
        Copy-Item "$publishDir\*" -Destination $payloadDir -Recurse -Force
        Get-ChildItem $payloadDir -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

    - name: Build MSIX Package
      run: >
        msbuild src/OpenClaw.Tray.WinUI/OpenClaw.Tray.WinUI.csproj
        /p:Configuration=Release
        /p:RuntimeIdentifier=${{ matrix.rid }}
        /p:Platform=${{ matrix.platform }}
        /p:PackageMsix=true
        /p:GenerateAppxPackageOnBuild=true
        /p:AppxPackageSigningEnabled=false
        /p:AppxBundle=Never
        /p:UapAppxPackageBuildMode=SideloadOnly
        /p:Version=${{ needs.test.outputs.majorMinorPatch }}
        /p:AppxPackageDir=AppPackages\

    - name: Find MSIX Package
      id: find-msix
      shell: pwsh
      run: |
        $msix = Get-ChildItem -Path src/OpenClaw.Tray.WinUI/AppPackages -Recurse -Filter "*.msix" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $msix) {
          Write-Error "No MSIX package found in AppPackages directory"
          exit 1
        }
        Write-Host "Found: $($msix.FullName)"
        echo "msix_path=$($msix.FullName)" >> $env:GITHUB_OUTPUT
        echo "msix_name=$($msix.Name)" >> $env:GITHUB_OUTPUT

    - name: Upload MSIX Artifact
      uses: actions/upload-artifact@v7
      with:
        name: openclaw-msix-${{ matrix.rid }}
        path: ${{ steps.find-msix.outputs.msix_path }}

  build-extension:
    needs: [test, e2etests]
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, arm64]

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Restore Command Palette Extension
      run: dotnet restore src/OpenClaw.CommandPalette

    - name: Build Command Palette Extension
      run: dotnet build src/OpenClaw.CommandPalette -c Debug -p:Platform=${{ matrix.platform }} --no-restore

    - name: Upload Extension Artifact
      uses: actions/upload-artifact@v7
      with:
        name: openclaw-commandpalette-${{ matrix.platform }}
        path: src/OpenClaw.CommandPalette/bin/${{ matrix.platform }}/Debug/

  release:
    needs: [repo-hygiene, test, e2etests, build, build-msix, build-extension]
    if: startsWith(github.ref, 'refs/tags/v') && needs.repo-hygiene.result == 'success' && needs.test.result == 'success' && needs.e2etests.result == 'success' && needs.build.result == 'success' && needs.build-msix.result == 'success' && needs.build-extension.result == 'success' && !cancelled()
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
    - uses: actions/checkout@v6

    - name: Download win-x64 tray artifact
      uses: actions/download-artifact@v8
      with:
        name: openclaw-tray-win-x64
        path: artifacts/tray-win-x64

    - name: Download win-arm64 tray artifact
      uses: actions/download-artifact@v8
      with:
        name: openclaw-tray-win-arm64
        path: artifacts/tray-win-arm64

    - name: Download win-x64 cmdpal artifact
      uses: actions/download-artifact@v8
      with:
        name: openclaw-commandpalette-x64
        path: artifacts/cmdpal-x64

    - name: Download win-arm64 cmdpal artifact
      uses: actions/download-artifact@v8
      with:
        name: openclaw-commandpalette-arm64
        path: artifacts/cmdpal-arm64

    - name: Download win-x64 MSIX artifact
      uses: actions/download-artifact@v8
      id: msix-x64
      with:
        name: openclaw-msix-win-x64
        path: artifacts/msix-x64

    - name: Download win-arm64 MSIX artifact
      uses: actions/download-artifact@v8
      id: msix-arm64
      with:
        name: openclaw-msix-win-arm64
        path: artifacts/msix-arm64

    - name: Rename MSIX packages
      shell: pwsh
      run: |
        $assetVersion = "${{ needs.test.outputs.semVer }}"
        $x64 = @(Get-ChildItem -Path artifacts/msix-x64 -Recurse -Filter "*.msix")
        $arm64 = @(Get-ChildItem -Path artifacts/msix-arm64 -Recurse -Filter "*.msix")
        if ($x64.Count -ne 1) { throw "Expected exactly one x64 MSIX artifact, found $($x64.Count)." }
        if ($arm64.Count -ne 1) { throw "Expected exactly one ARM64 MSIX artifact, found $($arm64.Count)." }
        Copy-Item $x64[0].FullName "OpenClawCompanion-$assetVersion-win-x64.msix"
        Copy-Item $arm64[0].FullName "OpenClawCompanion-$assetVersion-win-arm64.msix"

    - name: Disable NuGet source mapping for signing
      shell: pwsh
      run: |
        if (Test-Path NuGet.Config) {
          Rename-Item NuGet.Config NuGet.Config.signing.bak -Force
        }

    # Sign release artifacts on the x64 runner (ARM64 runner can't run the signing dlib).
    - name: Azure Login for Release Signing
      uses: azure/login@v3
      with:
        creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

    - name: Sign ARM64 Executables
      uses: azure/trusted-signing-action@v2
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://wus2.codesigning.azure.net/
        signing-account-name: hanselman
        certificate-profile-name: WindowsEdgeLight
        files-folder: artifacts/tray-win-arm64
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Sign Release MSIX Packages
      uses: azure/trusted-signing-action@v2
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://wus2.codesigning.azure.net/
        signing-account-name: hanselman
        certificate-profile-name: WindowsEdgeLight
        files-folder: .
        files-folder-filter: msix
        files-folder-depth: 1
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    # Render the hosted .appinstaller XML files that Windows AppInstaller polls
    # after install. Each architecture has its own stable URL because the release
    # currently publishes separate .msix packages, not a multi-arch .msixbundle.
    - name: Render AppInstaller
      shell: pwsh
      run: |
        $version = "${{ needs.test.outputs.majorMinorPatch }}.0"
        $tag = "${{ github.ref_name }}"
        $publisher = "CN=Scott Hanselman, O=Scott Hanselman, L=Forest Grove, S=Oregon, C=US"
        $isAlpha = "${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-') }}" -eq "true"
        $identityName = if ($isAlpha) { "OpenClaw.Companion.Alpha" } else { "OpenClaw.Companion" }
        $feedPrefix = if ($isAlpha) { "openclaw-alpha" } else { "openclaw" }
        $base = "https://github.com/${{ github.repository }}/releases/download/$tag"
        $x64Uri = "$base/OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.msix"
        $arm64Uri = "$base/OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.msix"
        ./scripts/render-appinstaller.ps1 `
          -Version $version `
          -Publisher $publisher `
          -IdentityName $identityName `
          -ProcessorArchitecture x64 `
          -MsixUri $x64Uri `
          -AppInstallerUri "https://raw.githubusercontent.com/openclaw/openclaw-windows-node/master/installer/appinstaller/$feedPrefix-x64.appinstaller" `
          -OutputPath "OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.appinstaller"
        ./scripts/render-appinstaller.ps1 `
          -Version $version `
          -Publisher $publisher `
          -IdentityName $identityName `
          -ProcessorArchitecture arm64 `
          -MsixUri $arm64Uri `
          -AppInstallerUri "https://raw.githubusercontent.com/openclaw/openclaw-windows-node/master/installer/appinstaller/$feedPrefix-arm64.appinstaller" `
          -OutputPath "OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.appinstaller"
        Copy-Item "OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.appinstaller" "$feedPrefix-x64.appinstaller"
        Copy-Item "OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.appinstaller" "$feedPrefix-arm64.appinstaller"

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        files: |
          OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.msix
          OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.msix
          OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.appinstaller
          OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.appinstaller
          openclaw*.appinstaller
        prerelease: ${{ contains(github.ref_name, '-') }}
        make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
        body: |
          ## OpenClaw Companion ${{ github.ref_name }}

          ### Downloads
          - **MSIX x64**: `OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.msix` — Intel / AMD 64-bit, with embedded AppInstaller metadata
          - **MSIX ARM64**: `OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.msix` — Windows on ARM, with embedded AppInstaller metadata
          - **AppInstaller x64**: `${{ contains(github.ref_name, '-') && 'openclaw-alpha-x64.appinstaller' || 'openclaw-x64.appinstaller' }}` — architecture update source for Intel / AMD 64-bit
          - **AppInstaller ARM64**: `${{ contains(github.ref_name, '-') && 'openclaw-alpha-arm64.appinstaller' || 'openclaw-arm64.appinstaller' }}` — architecture update source for Windows on ARM
          - **Tag-pinned AppInstaller x64**: `OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-x64.appinstaller`
          - **Tag-pinned AppInstaller ARM64**: `OpenClawCompanion-${{ needs.test.outputs.semVer }}-win-arm64.appinstaller`

          ### Features
          - 🦞 System tray integration with gateway status
          - 🎯 PowerToys Command Palette extension
          - 🔄 Auto-updates via Windows AppInstaller (non-Store channel)
          - ✅ Code-signed with Azure Trusted Signing
          - 📦 MSIX-only distribution: native camera/microphone/location consent prompts under our package name

          ### Requirements
          - Windows 10 version 1903 or later
          - [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/)
          - OpenClaw gateway running locally
          - PowerToys (for Command Palette extension)

          ### Quick Start
          1. Install the signed MSIX for your architecture. On supported Windows builds, the package includes embedded AppInstaller metadata for automatic background updates.
          2. Launch from Start Menu or system tray.
          3. Right-click tray icon → Settings to configure.

    - name: Request AppInstaller feed PR
      if: success()
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh workflow run appinstaller-feed-pr.yml `
          --repo "${{ github.repository }}" `
          --ref master `
          -f tag="${{ github.ref_name }}"
