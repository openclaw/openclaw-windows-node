name: openclaw-windows-node-codeql-csharp-security

disable-default-queries: true

queries:
  - uses: security-extended

query-filters:
  - include:
      precision:
        - high
        - very-high
      tags contain: security
      security-severity: /([7-9]|10)\.(\d)+/

paths:
  - src

paths-ignore:
  - "**/bin"
  - "**/obj"
  - "**/TestResults"
  - "**/*.Tests"
  - "**/*Tests"
  - "**/*Test*"
